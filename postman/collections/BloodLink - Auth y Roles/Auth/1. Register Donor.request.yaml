$kind: http-request
description: Registra un usuario nuevo y guarda userId/targetUserId automáticamente.
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Juan",
      "surname": "Pérez",
      "username": "{{testUsername}}",
      "email": "{{testEmail}}",
      "password": "{{testPassword}}",
      "phone": "{{testPhone}}"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        const response = pm.response.json();
        if (response.user && response.user.id) {
          pm.environment.set('userId', response.user.id);
          pm.environment.set('targetUserId', response.user.id);
        }
      }
    language: text/javascript
order: 1000
