$kind: http-request
description: Restablece contraseña usando token de recuperación.
url: "{{baseUrl}}/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "token": "{{resetToken}}",
      "newPassword": "{{newPassword}}"
    }
order: 8000
