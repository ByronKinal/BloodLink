$kind: http-request
description: Login de Staff y guarda tokenStaff/refreshTokenStaff.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "emailOrUsername": "{{staffEmail}}",
      "password": "{{staffPassword}}"
    }
scripts:
  - type: afterResponse
    code: >-
      if (pm.response.code === 200) {
        const response = pm.response.json();
        if (response.accessToken) pm.environment.set('tokenStaff', response.accessToken);
        if (response.refreshToken) pm.environment.set('refreshTokenStaff', response.refreshToken);
      }
    language: text/javascript
order: 10000
